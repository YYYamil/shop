<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">

            Mi Shop

        </div>



        <input
            type="text"
            id="busqueda"
            placeholder="Buscar productos..."
            onkeyup="buscarProductos()"
        >



        <a href="/carrito.html"
           class="carrito-btn">

            🛒

            <span id="contadorCarrito">

                0

            </span>

        </a>

    </header>



    <section class="hero">

        <h1>

            Bienvenidos

        </h1>

        <p>

            Nueva colección!!!

        </p>

    </section>



    <section class="categorias">

        <button onclick="filtrarCategoria(0)">

            Todos

        </button>

        <button onclick="filtrarCategoria(1)">

            Ropa

        </button>

        <button onclick="filtrarCategoria(2)">

            Calzado

        </button>

        <button onclick="filtrarCategoria(3)">

            Accesorios

        </button>

    </section>



    <main
        id="productos"
        class="productos-grid"
    ></main>



    <script src="/js/script.js"></script>

</body>

</html>
