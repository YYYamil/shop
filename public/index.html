<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=3">
    <link href="/css/output.css" rel="stylesheet">

</head>

<body>

    <header class="navbar">

        <div class="logo">

            Mi Shop

        </div>

        <button class="hamburguesa" onclick="toggleMenu()" aria-label="Menú">
            ☰
        </button>

        <div class="nav-menu" id="navMenu">

            <input
                type="text"
                id="busqueda"
                placeholder="Buscar productos..."
                onkeyup="buscarProductos()"
            >

            <div class="carrito-wrapper">
                <a href="/carrito.html"
                   class="carrito-btn">

                    🛒

                    <span id="contadorCarrito">

                        0

                    </span>

                </a>
                <div class="carrito-preview" id="carritoPreview"></div>
            </div>

        </div>

    </header>



    <section class="hero">

        <h1>

            Bienvenidos

        </h1>

        <p>

            Nueva colección!!!

        </p>

    </section>



    <section class="categorias">

        <button onclick="filtrarCategoria(0)">

            Todos

        </button>

        <button onclick="filtrarCategoria(1)">

            Ropa

        </button>

        <button onclick="filtrarCategoria(2)">

            Calzado

        </button>

        <button onclick="filtrarCategoria(3)">

            Accesorios

        </button>

    </section>



    <main
        id="productos"
        class="productos-grid"
    ></main>



    <!-- Modal para imágenes -->
    <div class="modal-overlay" id="modalOverlay" onclick="cerrarModal()">
        <span class="modal-cerrar" onclick="cerrarModal()">&times;</span>
        <img class="modal-imagen" id="modalImagen" src="" alt="Imagen ampliada">
    </div>

    <script src="/js/script.js"></script>
</body>

</html>
