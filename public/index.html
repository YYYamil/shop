<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=11">

    <link href="/css/output.css"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">

            Mi Shop

        </div>

        <button class="hamburguesa"
                onclick="toggleMenu()"
                aria-label="Menú">

            ☰

        </button>

        <div class="nav-menu"
             id="navMenu">

            <div class="search-wrapper">

                <input
                    type="text"
                    id="busqueda"
                    placeholder="Buscar productos..."
                    onkeyup="buscarProductos()"
                >

            </div>

            <div class="carrito-wrapper">

                <a href="/carrito.html"
                   class="carrito-btn">

                    🛒

                    <span id="contadorCarrito">

                        0

                    </span>

                </a>

                <div class="carrito-preview"
                     id="carritoPreview"></div>

            </div>

        </div>

    </header>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <span class="hero-badge">

                ✨ Nueva colección 2026

            </span>

            <h1>

                Descubrí tu próximo estilo

            </h1>

            <p>

                Productos modernos, elegantes y seleccionados para vos

            </p>

            <a href="#productos"
               class="hero-btn">

                Explorar productos

            </a>

        </div>

    </section>

    <!-- CATEGORIAS -->
    <section class="categorias">

        <button onclick="filtrarCategoria(0)">

            Todos

        </button>

        <button onclick="filtrarCategoria(1)">

            Ropa

        </button>

        <button onclick="filtrarCategoria(2)">

            Calzado

        </button>

        <button onclick="filtrarCategoria(3)">

            Accesorios

        </button>

    </section>

    <!-- PRODUCTOS -->
    <main
        id="productos"
        class="productos-grid"
    ></main>

    <!-- MODAL -->
    <div class="modal-overlay"
         id="modalOverlay"
         onclick="cerrarModal()">

        <span class="modal-cerrar"
              onclick="cerrarModal()">

            &times;

        </span>

        <img class="modal-imagen"
             id="modalImagen"
             src=""
             alt="Imagen ampliada">

    </div>

    <script src="/js/script.js"></script>

</body>

<!-- FOOTER -->

<footer class="footer">

    <div class="footer-content">

        <div class="footer-brand">

            <h2>

                Mi Shop

            </h2>

            <p>

                Moda, estilo y tecnología para tu día a día.

            </p>

        </div>

        <div class="footer-social">

            <a href="https://instagram.com"
               target="_blank"
               class="social-btn instagram">

            <a href="https://facebook.com"

               target="_blank"

                <svg xmlns="http://www.w3.org/2000/svg"

        </div>

    </div>

    <div class="footer-bottom">

        © 2026 Mi Shop - Todos los derechos reservados

    </div>

</footer>

</html>
