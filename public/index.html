<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=17">

    <link href="/css/output.css"
          rel="stylesheet">

</head>

<body>

    <!-- ===== SPLASH SCREEN ===== -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <img id="splashLogo" src="" alt="Logo" class="splash-logo">
            <div class="splash-dots">
                <span class="splash-dot"></span>
                <span class="splash-dot"></span>
                <span class="splash-dot"></span>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <header class="navbar">

        <!-- Hamburguesa (solo mobile) -->
        <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenuCategorias()" aria-label="Menú de categorías">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Logo centrado -->
        <div class="logo">
            Mi Shop
        </div>

        <!-- Acciones derecha: búsqueda + carrito -->
        <div class="nav-actions">

            <button class="search-toggle"
                    onclick="toggleSearch()"
                    aria-label="Buscar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>

            <div class="carrito-wrapper">
                <button class="carrito-btn" id="carritoBtn" onclick="togglePreviewCarrito(event)">
                    <span class="carrito-icono">🛒</span>
                    <span id="contadorCarrito">0</span>
                </button>
                <div class="carrito-preview" id="carritoPreview"></div>
            </div>

        </div>

        <!-- Barra de búsqueda (se despliega con toggleSearch) -->
        <div class="search-wrapper" id="searchWrapper">
            <div class="search-input-wrapper">
                <input
                    type="text"
                    id="busqueda"
                    placeholder="Buscar productos..."
                    onkeyup="buscarProductos()"
                >
                <button class="search-clear" onclick="limpiarBusqueda()" aria-label="Limpiar búsqueda">✕</button>
            </div>
        </div>

    </header>

    <!-- SIDEBAR CATEGORÍAS MÓVIL -->
    <aside class="sidebar-categorias" id="sidebarCategorias">
        <div class="sidebar-categorias-header">
            <h3>Categorías</h3>
            <button class="sidebar-categorias-cerrar" onclick="toggleMenuCategorias()" aria-label="Cerrar menú">&times;</button>
        </div>
        <nav class="sidebar-categorias-nav" id="menuCategorias">
            <!-- Se renderiza dinámicamente desde renderizarCategorias() -->
        </nav>
    </aside>
    <div class="sidebar-categorias-overlay" id="sidebarOverlay" onclick="toggleMenuCategorias()"></div>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <!-- <span class="hero-badge">

                ✨ Bienvenido

            </span> -->

            <h1>

                Descubrí tu próximo estilo

            </h1>

            <p>

                Productos modernos, elegantes y seleccionados para vos

            </p>

            <!-- <a href="#productos"
               class="hero-btn">

                Explorar productos

            </a> -->
            

        </div>

    </section>

    <!-- ===== MARQUEE PREMIUM (dinámico desde configuración) ===== -->
    <section class="premium-marquee" id="marqueeContainer">
        <div class="premium-marquee-track"></div>
    </section>

    <!-- CATEGORIAS -->
    <section class="categorias" id="categorias">

    </section>

    <!-- PRODUCTOS -->
    <main
        id="productos"
        class="productos-grid"
    ></main>

    <!-- MODAL PRODUCTO -->
    <div class="modal-overlay"
         id="modalOverlay"
         onclick="cerrarModal()">

        <div class="modal-contenido"
             onclick="event.stopPropagation()">

            <span class="modal-cerrar"
                  onclick="cerrarModal()">
                &times;
            </span>

            <!-- Carrusel de imágenes -->
            <div class="modal-carrusel" id="modalCarrusel"></div>

            <!-- Botón compartir (fuera del carrusel para que no lo borre innerHTML) -->
            <button class="modal-share-btn" id="modalShareBtn" onclick="compartirProducto(event)" aria-label="Compartir producto">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
            </button>

            <!-- Info del producto -->
            <div class="modal-info">
                <h2 class="modal-nombre" id="modalNombre"></h2>
                <div class="modal-precio" id="modalPrecio"></div>
                <div class="modal-stock" id="modalStock"></div>
                <div class="modal-descripcion" id="modalDescripcion"></div>
                <button class="modal-btn-carrito" id="modalBtnCarrito">
                    Agregar al carrito
                </button>
            </div>

        </div>

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-content">

            <div class="footer-brand">

                <h2>

                    Mi Shop

                </h2>

                <p>

                    Moda, estilo y tecnología para tu día a día.

                </p>

            </div>

            <div class="footer-social" id="footerSocial">

            </div>

        </div>

        <div class="footer-bottom">

            © 2026 Mi Shop - Todos los derechos reservados

        </div>

    </footer>

    <script src="/js/config.js?v=6"></script>
    <script src="/js/script.js?v=6"></script>

</body>

</html>
