<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=11">

    <link href="/css/output.css"
          rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">

            Mi Shop

        </div>

        <div class="nav-menu"
             id="navMenu">

            <div class="search-wrapper">

                <div class="search-input-wrapper">
                    <input
                        type="text"
                        id="busqueda"
                        placeholder="Buscar productos..."
                        onkeyup="buscarProductos()"
                    >
                    <button class="search-clear" onclick="limpiarBusqueda()" aria-label="Limpiar búsqueda">✕</button>
                </div>

                <button class="search-toggle"
                        onclick="toggleSearch()"
                        aria-label="Buscar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>

            </div>

            <div class="carrito-wrapper">

                <a href="/carrito.html"
                   class="carrito-btn">

                    🛒

                    <span id="contadorCarrito">

                        0

                    </span>

                </a>

                <div class="carrito-preview"
                     id="carritoPreview"></div>

            </div>

        </div>

    </header>

    <!-- HERO -->
    <section class="hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <span class="hero-badge">

                ✨ Bienvenido

            </span>

            <h1>

                Descubrí tu próximo estilo

            </h1>

            <p>

                Productos modernos, elegantes y seleccionados para vos

            </p>

            <!-- <a href="#productos"
               class="hero-btn">

                Explorar productos

            </a> -->
            

        </div>

    </section>

    <!-- CATEGORIAS -->
    <section class="categorias" id="categorias">

    </section>

    <!-- PRODUCTOS -->
    <main
        id="productos"
        class="productos-grid"
    ></main>

    <!-- MODAL -->
    <div class="modal-overlay"
         id="modalOverlay"
         onclick="cerrarModal()">

        <span class="modal-cerrar"
              onclick="cerrarModal()">

            &times;

        </span>

        <img class="modal-imagen"
             id="modalImagen"
             src=""
             alt="Imagen ampliada">

    </div>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-content">

            <div class="footer-brand">

                <h2>

                    Mi Shop

                </h2>

                <p>

                    Moda, estilo y tecnología para tu día a día.

                </p>

            </div>

            <div class="footer-social" id="footerSocial">

            </div>

        </div>

        <div class="footer-bottom">

            © 2026 Mi Shop - Todos los derechos reservados

        </div>

    </footer>

    <script src="/js/config.js"></script>
    <script src="/js/script.js"></script>

</body>

</html>
