<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Carrito - Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=15">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <a href="/" style="text-decoration:none;color:inherit;">Mi Shop</a>
        </div>

        <div class="nav-menu" style="display:flex;align-items:center;gap:15px;">

            <a href="/" class="btn-ir-tienda hide-mobile" style="padding:8px 18px;font-size:14px;"> Volver</a>

            <div class="carrito-wrapper">

                <a href="/carrito.html"
                   class="carrito-btn">

                    <span class="carrito-icono">🛒</span>

                    <span id="contadorCarrito">

                        0

                    </span>

                </a>

            </div>

        </div>

    </header>



    <main class="carrito-page">

        <h1 class="carrito-titulo">🛒 Tu Carrito</h1>



        <div id="carrito-vacio" class="carrito-vacio" style="display:none;">
            <p>Tu carrito está vacío</p>
            <a href="/" class="btn-ir-tienda">Ir a la tienda</a>
        </div>



        <div id="carrito-contenido" class="carrito-contenido">

            <div class="carrito-items" id="carrito"></div>



            <div class="carrito-resumen">

                <h2>Resumen</h2>

                <div class="resumen-linea">
                    <span>Productos</span>
                    <span id="resumen-cantidad">0</span>
                </div>

                <div class="resumen-linea resumen-total">
                    <span>Total</span>
                    <span id="total">$ 0</span>
                </div>



                <div class="resumen-datos">
                    <h3>Tus datos</h3>
                    <input
                        type="text"
                        id="cliente"
                        placeholder="Nombre completo"
                        class="resumen-input"
                    >
                    <div class="telefono-row">
                        <div class="telefono-field">
                            <label class="telefono-label" for="tel-codigo">Código</label>
                            <input
                                type="text"
                                id="tel-codigo"
                                placeholder="Ej: 381"
                                class="resumen-input tel-codigo"
                                inputmode="numeric"
                                pattern="[0-9]*"
                                maxlength="4"
                            >
                        </div>
                        <div class="telefono-field">
                            <label class="telefono-label" for="tel-numero">Número</label>
                            <input
                                type="text"
                                id="tel-numero"
                                placeholder="Ej: 384536000"
                                class="resumen-input tel-numero"
                                inputmode="numeric"
                                pattern="[0-9]*"
                                maxlength="9"
                            >
                        </div>
                    </div>
                </div>



                <button onclick="finalizarCompra()" class="btn-finalizar" id="btnFinalizar">
                    <svg width="20" height="20" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:6px;"><path fill="currentColor" d="M4.9,43.3l2.7-9.8C5.9,30.6,5,27.3,5,24C5,13.5,13.5,5,24,5c5.1,0,9.8,2,13.4,5.6 C41,14.2,43,18.9,43,24c0,10.5-8.5,19-19,19c0,0,0,0,0,0h0c-3.2,0-6.3-0.8-9.1-2.3L4.9,43.3z"></path><path fill="currentColor" d="M24,5c5.1,0,9.8,2,13.4,5.6C41,14.2,43,18.9,43,24c0,10.5-8.5,19-19,19h0c-3.2,0-6.3-0.8-9.1-2.3 L4.9,43.3l2.7-9.8C5.9,30.6,5,27.3,5,24C5,13.5,13.5,5,24,5 M24,43L24,43L24,43 M24,43L24,43L24,43 M24,4L24,4C13,4,4,13,4,24 c0,3.4,0.8,6.7,2.5,9.6L3.9,43c-0.1,0.3,0,0.7,0.3,1c0.2,0.2,0.4,0.3,0.7,0.3c0.1,0,0.2,0,0.3,0l9.7-2.5c2.8,1.5,6,2.2,9.2,2.2 c11,0,20-9,20-20c0-5.3-2.1-10.4-5.8-14.1C34.4,6.1,29.4,4,24,4L24,4z"></path><path fill="currentColor" d="M35.2,12.8c-3-3-6.9-4.6-11.2-4.6C15.3,8.2,8.2,15.3,8.2,24c0,3,0.8,5.9,2.4,8.4L11,33l-1.6,5.8 l6-1.6l0.6,0.3c2.4,1.4,5.2,2.2,8,2.2h0c8.7,0,15.8-7.1,15.8-15.8C39.8,19.8,38.2,15.8,35.2,12.8z"></path><path fill="currentColor" fill-rule="evenodd" d="M19.3,16c-0.4-0.8-0.7-0.8-1.1-0.8c-0.3,0-0.6,0-0.9,0 s-0.8,0.1-1.3,0.6c-0.4,0.5-1.7,1.6-1.7,4s1.7,4.6,1.9,4.9s3.3,5.3,8.1,7.2c4,1.6,4.8,1.3,5.7,1.2c0.9-0.1,2.8-1.1,3.2-2.3 c0.4-1.1,0.4-2.1,0.3-2.3c-0.1-0.2-0.4-0.3-0.9-0.6s-2.8-1.4-3.2-1.5c-0.4-0.2-0.8-0.2-1.1,0.2c-0.3,0.5-1.2,1.5-1.5,1.9 c-0.3,0.3-0.6,0.4-1,0.1c-0.5-0.2-2-0.7-3.8-2.4c-1.4-1.3-2.4-2.8-2.6-3.3c-0.3-0.5,0-0.7,0.2-1c0.2-0.2,0.5-0.6,0.7-0.8 c0.2-0.3,0.3-0.5,0.5-0.8c0.2-0.3,0.1-0.6,0-0.8C20.6,19.3,19.7,17,19.3,16z" clip-rule="evenodd"></path>
                    </svg>
                    Enviar
                </button>

            </div>

        </div>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <div class="footer-content">

            <div class="footer-brand">

                <h2>

                    Mi Shop

                </h2>

                <p>

                    Moda, estilo y tecnología para tu día a día.

                </p>

            </div>

            <div class="footer-social" id="footerSocial">

            </div>

        </div>

        <div class="footer-bottom">

            © 2026 Mi Shop - Todos los derechos reservados

        </div>

    </footer>

    <script src="/js/config.js?v=2"></script>
    <script src="/js/carrito.js?v=2"></script>

</body>

</html>
