<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Carrito - Mi Shop</title>

    <link rel="stylesheet"
          href="/css/store.css?v=11">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <a href="/" style="text-decoration:none;color:inherit;">Mi Shop</a>
        </div>

        <div class="nav-menu" style="display:flex;align-items:center;gap:15px;">

            <a href="/" class="volver-btn">← Volver a la tienda</a>

        </div>

    </header>



    <main class="carrito-page">

        <h1 class="carrito-titulo">🛒 Tu Carrito</h1>



        <div id="carrito-vacio" class="carrito-vacio" style="display:none;">
            <p>Tu carrito está vacío</p>
            <a href="/" class="btn-ir-tienda">Ir a la tienda</a>
        </div>



        <div id="carrito-contenido" class="carrito-contenido">

            <div class="carrito-items" id="carrito"></div>



            <div class="carrito-resumen">

                <h2>Resumen</h2>

                <div class="resumen-linea">
                    <span>Productos</span>
                    <span id="resumen-cantidad">0</span>
                </div>

                <div class="resumen-linea resumen-total">
                    <span>Total</span>
                    <span id="total">$ 0</span>
                </div>



                <div class="resumen-datos">
                    <h3>Tus datos</h3>
                    <input
                        type="text"
                        id="cliente"
                        placeholder="Nombre completo"
                        class="resumen-input"
                    >
                    <input
                        type="text"
                        id="telefono"
                        placeholder="Teléfono"
                        class="resumen-input"
                    >
                </div>



                <button onclick="finalizarCompra()" class="btn-finalizar" id="btnFinalizar">
                    📱 Finalizar pedido por WhatsApp
                </button>

            </div>

        </div>

    </main>



    <script src="/js/carrito.js"></script>

</body>
