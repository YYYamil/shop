<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Login</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link href="/css/output.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-card .input-group {
            margin-bottom: 20px;
        }
        .login-card label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-card input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .login-card button:hover {
            background: #334155;
        }
        .login-card .error {
            color: #ef4444;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .login-card .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .login-footer a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">⚙️</div>
        <h1>Super Admin</h1>
        <p class="subtitle">Acceso al panel de control multi-tienda</p>
        
        <div class="input-group">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="usuario superadmin" autocomplete="username" />
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        
        <button onclick="loginSuperAdmin()">Ingresar</button>
        <div class="error" id="errorMsg">Credenciales incorrectas</div>
        
        <div class="login-footer">
            <a href="/">← Volver a la tienda</a>
        </div>
    </div>

    <script>
    async function loginSuperAdmin() {
        const usuario = document.getElementById('usuario').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('errorMsg');
        
        if (!usuario || !password) {
            errorEl.textContent = 'Completá todos los campos';
            errorEl.style.display = 'block';
            return;
        }
        
        try {
            const res = await fetch('/auth/login/superadmin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password }),
                credentials: 'same-origin'
            });
            
            const data = await res.json();
            
            if (data.ok) {
                window.location = '/superadmin/';
            } else {
                errorEl.textContent = data.error || 'Credenciales incorrectas';
                errorEl.style.display = 'block';
            }
        } catch (err) {
            errorEl.textContent = 'Error de conexión';
            errorEl.style.display = 'block';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginSuperAdmin();
        });
    });
    </script>
</body>
</html>
