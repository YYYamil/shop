<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Admin - Categorías</title>

    <link href="/css/output.css" rel="stylesheet">

    <link rel="stylesheet"
          href="/css/admin.css?v=15">

</head>

<body class="bg-gray-100">

    <!-- Botón hamburguesa para mobile -->
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR UNIFICADO -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <h2>Panel Admin</h2>

                <p class="sidebar-subtitle">Gestión de tienda</p>

            </div>

            <nav class="sidebar-nav" id="sidebarNav">

                <a href="/admin/dashboard.html" class="nav-link" data-page="dashboard">
                    📊 Dashboard
                </a>

                <a href="/admin/admin.html" class="nav-link" data-page="admin">
                    📦 Productos
                </a>

                <a href="/admin/pedidos.html" class="nav-link" data-page="pedidos">
                    🛒 Pedidos
                </a>

                <a href="/admin/categorias.html" class="active nav-link" data-page="categorias">
                    🏷️ Categorías
                </a>

                <a href="/admin/personalizacion.html" class="nav-link" data-page="personalizacion">
                    🎨 Personalizar
                </a>

                <a href="/superadmin/" id="linkSuperAdmin" style="display:none;border-top:1px solid #334155;margin-top:8px;padding-top:12px;" class="nav-link" data-page="superadmin">
                    ⚙️ Super Admin
                </a>

            </nav>

            <div class="sidebar-footer">

                <button onclick="logout()" class="logout-btn">
                    Cerrar sesión
                </button>

            </div>

        </aside>

        <!-- MAIN -->
        <main class="admin-content">

            <!-- TOPBAR -->
            <div class="topbar">

                <div>

                    <h1>Categorías</h1>

                    <p id="contadorInfo">Gestioná la visibilidad y nombres de las categorías</p>

                </div>

            </div>

            <!-- LISTA DE CATEGORÍAS -->
            <div id="listaCategorias" class="categorias-admin-lista">

                <!-- Se llena dinámicamente desde admin-categorias.js -->

            </div>

        </main>

    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/storeContext.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin-menu.js?v=2"></script>

    <script>
        verificarAuth();
    </script>

    <script src="/js/admin-categorias.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', prefijarSidebar);
    </script>

    <!-- Script para el menú hamburguesa -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleMenu() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }

            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>

</body>

</html>
