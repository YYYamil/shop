<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Admin - Productos</title>

    <link href="/css/output.css" rel="stylesheet">

    <link rel="stylesheet"
          href="/css/admin.css?v=12">

</head>

<body class="bg-gray-100">

    <!-- Botón hamburguesa para mobile -->
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR UNIFICADO -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <h2>Panel Admin</h2>

                <p class="sidebar-subtitle">Gestión de tienda</p>

            </div>

            <nav class="sidebar-nav">

                <a href="/admin/dashboard.html">
                    📊 Dashboard
                </a>

                <a href="/admin/admin.html" class="active">
                    📦 Productos
                </a>

                <a href="/admin/pedidos.html">
                    🛒 Pedidos
                </a>

                <a href="/admin/personalizacion.html">
                    🎨 Personalizar
                </a>

            </nav>

            <div class="sidebar-footer">

                <button onclick="logout()" class="logout-btn">
                    Cerrar sesión
                </button>

            </div>

        </aside>

        <!-- MAIN -->
        <main class="admin-content">

            <!-- TOPBAR -->
            <div class="topbar">

                <div>

                    <h1>Productos</h1>

                    <p id="contadorInfo">0 productos en total</p>

                </div>

                <button onclick="abrirPanelProducto()" class="btn-agregar" id="btnAgregarProducto">
                    <span class="btn-agregar-icon">+</span>
                    <span>Nuevo producto</span>
                </button>

            </div>

            <!-- BARRA DE BÚSQUEDA Y FILTROS -->
            <div class="search-bar">

                <div class="search-input-group">
                    <span class="search-icon">🔍</span>
                    <input type="text"
                           id="buscadorProductos"
                           placeholder="Buscar producto o categoría..."
                           autocomplete="off">
                    <button class="search-clear" id="btnLimpiarBusqueda" aria-label="Limpiar búsqueda">✕</button>
                </div>

                <button class="btn-filtrar" id="btnFiltrar" onclick="toggleFiltros()" aria-label="Filtrar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" y1="6" x2="20" y2="6"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                        <line x1="10" y1="18" x2="14" y2="18"/>
                    </svg>
                </button>

            </div>

            <!-- PANEL DE FILTROS (colapsable) -->
            <div class="filtros-panel" id="filtrosPanel">

                <div class="filtros-row">

                    <div class="filtro-group">
                        <label>Categoría</label>
                        <select id="filtroCategoria">
                            <option value="">Todas</option>
                        </select>
                    </div>

                    <div class="filtro-group">
                        <label>Stock</label>
                        <select id="filtroStock">
                            <option value="">Todos</option>
                            <option value="bajo">Stock bajo (≤5)</option>
                            <option value="agotado">Sin stock</option>
                            <option value="disponible">Con stock</option>
                        </select>
                    </div>

                    <div class="filtro-group">
                        <label>Ordenar</label>
                        <select id="filtroOrden">
                            <option value="nombre">Nombre A-Z</option>
                            <option value="nombre_desc">Nombre Z-A</option>
                            <option value="precio">Menor precio</option>
                            <option value="precio_desc">Mayor precio</option>
                            <option value="stock">Menor stock</option>
                        </select>
                    </div>

                </div>

            </div>

            <!-- LISTA DE PRODUCTOS -->
            <div id="listaProductos" class="productos-lista"></div>

            <!-- PAGINACIÓN -->
            <div class="paginacion" id="paginacion">

                <button id="btnAnterior" class="btn-pagina" aria-label="Anterior">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    Anterior
                </button>

                <span id="paginaActual" class="pagina-info">Página 1</span>

                <button id="btnSiguiente" class="btn-pagina" aria-label="Siguiente">
                    Siguiente
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>

            </div>

        </main>

    </div>

    <!-- PANEL LATERAL / MODAL PARA CREAR/EDITAR PRODUCTO -->
    <div class="panel-overlay" id="panelOverlay" onclick="cerrarPanelProducto()"></div>

    <div class="panel-producto" id="panelProducto">

        <div class="panel-producto-header">

            <h2 id="panelProductoTitulo">Nuevo producto</h2>

            <button onclick="cerrarPanelProducto()" class="btn-cerrar-panel" aria-label="Cerrar">✕</button>

        </div>

        <div class="panel-producto-body">

            <input type="hidden" id="idProducto">
            <input type="hidden" id="imagenesActual">

            <!-- Nombre -->
            <div class="campo">
                <label for="nombre">Nombre del producto</label>
                <input type="text" id="nombre" placeholder="Ej: Zapatillas Nike Air" autocomplete="off">
            </div>

            <!-- Descripción -->
            <div class="campo">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" placeholder="Descripción del producto..." rows="3"></textarea>
            </div>

            <!-- Precio y Stock en fila -->
            <div class="campo-row">
                <div class="campo">
                    <label for="precio">Precio ($)</label>
                    <input type="number" id="precio" placeholder="0" min="0" step="0.01">
                </div>
                <div class="campo">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" placeholder="0" min="0">
                </div>
            </div>

            <!-- Categoría -->
            <div class="campo">
                <label for="categoria_id">Categoría</label>
                <div class="campo-categoria">
                    <select id="categoria_id"></select>
                    <button onclick="crearCategoria()" class="btn-add-categoria" title="Crear nueva categoría">+</button>
                </div>
            </div>

            <!-- Imágenes -->
            <div class="campo">
                <label>Imágenes del producto (máx. 4)</label>
                <div class="imagenes-upload" id="imagenesUpload">
                    <div class="imagen-upload-item" data-index="0">
                        <input type="file" id="imagen0" accept="image/*" onchange="previewImagen(this, 0)">
                        <label for="imagen0" class="imagen-upload-placeholder" id="placeholder0">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>Agregar imagen</span>
                        </label>
                        <div class="imagen-upload-preview" id="preview0" style="display:none">
                            <img id="previewImg0" src="" alt="Preview">
                            <button type="button" class="btn-remove-img" onclick="removerImagen(0)" aria-label="Eliminar imagen">✕</button>
                        </div>
                    </div>
                    <div class="imagen-upload-item" data-index="1">
                        <input type="file" id="imagen1" accept="image/*" onchange="previewImagen(this, 1)">
                        <label for="imagen1" class="imagen-upload-placeholder" id="placeholder1">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>Agregar imagen</span>
                        </label>
                        <div class="imagen-upload-preview" id="preview1" style="display:none">
                            <img id="previewImg1" src="" alt="Preview">
                            <button type="button" class="btn-remove-img" onclick="removerImagen(1)" aria-label="Eliminar imagen">✕</button>
                        </div>
                    </div>
                    <div class="imagen-upload-item" data-index="2">
                        <input type="file" id="imagen2" accept="image/*" onchange="previewImagen(this, 2)">
                        <label for="imagen2" class="imagen-upload-placeholder" id="placeholder2">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>Agregar imagen</span>
                        </label>
                        <div class="imagen-upload-preview" id="preview2" style="display:none">
                            <img id="previewImg2" src="" alt="Preview">
                            <button type="button" class="btn-remove-img" onclick="removerImagen(2)" aria-label="Eliminar imagen">✕</button>
                        </div>
                    </div>
                    <div class="imagen-upload-item" data-index="3">
                        <input type="file" id="imagen3" accept="image/*" onchange="previewImagen(this, 3)">
                        <label for="imagen3" class="imagen-upload-placeholder" id="placeholder3">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span>Agregar imagen</span>
                        </label>
                        <div class="imagen-upload-preview" id="preview3" style="display:none">
                            <img id="previewImg3" src="" alt="Preview">
                            <button type="button" class="btn-remove-img" onclick="removerImagen(3)" aria-label="Eliminar imagen">✕</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="panel-producto-footer">

            <button onclick="cerrarPanelProducto()" class="btn-cancelar">Cancelar</button>

            <button onclick="guardarProducto()" class="btn-guardar" id="btnGuardarProducto">
                <span id="btnGuardarTexto">Guardar producto</span>
                <span id="btnGuardarSpinner" class="spinner" style="display:none"></span>
            </button>

        </div>

    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/auth.js"></script>

    <script>
        verificarAuth();
    </script>

    <script src="/js/admin.js?v=12"></script>

    <!-- Script para el menú hamburguesa -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleMenu() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }

            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>

</body>

</html>
