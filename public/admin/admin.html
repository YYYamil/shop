<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin</title>

    <link href="/css/output.css" rel="stylesheet">

    <link rel="stylesheet"
          href="/css/admin.css">

</head>

<body class="bg-gray-100">

    <!-- Botón hamburguesa para mobile -->
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR UNIFICADO -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <h2>Panel Admin</h2>

                <p class="sidebar-subtitle">Gestión de tienda</p>

            </div>

            <nav class="sidebar-nav">

                <a href="/admin/dashboard.html">
                    📊 Dashboard
                </a>

                <a href="/admin/admin.html" class="active">
                    📦 Productos
                </a>

                <a href="/admin/pedidos.html">
                    🛒 Pedidos
                </a>

            </nav>

            <div class="sidebar-footer">

                <button onclick="logout()" class="logout-btn">
                    Cerrar sesión
                </button>

            </div>

        </aside>

        <!-- MAIN -->
        <main class="admin-content">

            <!-- HEADER -->
            <div class="topbar">

                <div>

                    <h1>Gestión de productos</h1>

                    <p>Administra catálogo, stock e imágenes</p>

                </div>

                <div class="stats-card">

                    <span>Productos</span>

                    <strong id="contadorProductos">0</strong>

                </div>

            </div>

            <!-- FORM -->
            <section class="form-card">

                <div class="form-header">

                    <h2>Producto</h2>

                    <button onclick="limpiarFormulario()"
                            class="secondary-btn">

                        Limpiar
                    </button>

                </div>

                <input
                    type="hidden"
                    id="idProducto"
                >

                <input
                    type="hidden"
                    id="imagenesActual"
                >

                <div class="form-grid">

                    <div class="input-group">

                        <label>Nombre</label>

                        <input
                            type="text"
                            id="nombre"
                            placeholder="Ej: Zapatillas Nike"
                        >

                    </div>

                    <div class="input-group">

                        <label>Precio</label>

                        <input
                            type="number"
                            id="precio"
                            placeholder="$ 0"
                        >

                    </div>

                    <div class="input-group">

                        <label>Stock</label>

                        <input
                            type="number"
                            id="stock"
                            placeholder="0"
                        >

                    </div>

                    <div class="input-group">

                        <label>Categoría</label>

                        <select id="categoria_id"></select>

                    </div>

                </div>

                <div class="input-group">

                    <label>Descripción</label>

                    <textarea
                        id="descripcion"
                        placeholder="Descripción del producto"
                    ></textarea>

                </div>

                <!-- IMAGENES -->
                <div class="imagenes-section">

                    <h3>Imágenes del producto</h3>

                    <p>Puedes subir hasta 4 imágenes</p>

                    <div class="imagenes-grid">

                        <input type="file"
                               id="imagen0"
                               accept="image/*">

                        <input type="file"
                               id="imagen1"
                               accept="image/*">

                        <input type="file"
                               id="imagen2"
                               accept="image/*">

                        <input type="file"
                               id="imagen3"
                               accept="image/*">

                    </div>

                </div>

                <button onclick="guardarProducto()"
                        class="primary-btn">

                    Guardar producto
                </button>

            </section>

            <!-- BUSCADOR -->
            <section class="search-section">

                <input type="text"
                       id="buscadorProductos"
                       placeholder="Buscar producto o categoría...">

            </section>

            <!-- PRODUCTOS -->
            <div
                id="listaProductos"
                class="grid"
            ></div>

            <!-- PAGINADO -->
            <div class="pagination">

                <button id="btnAnterior">

                    ← Anterior
                </button>

                <span id="paginaActual">

                    Página 1
                </span>

                <button id="btnSiguiente">

                    Siguiente →
                </button>

            </div>

        </main>

    </div>

    <script src="/js/auth.js"></script>

    <script>
        verificarAuth();
    </script>

    <script src="/js/admin.js"></script>

    <!-- Script para el menú hamburguesa -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleMenu() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }

            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>

</body>

</html>
