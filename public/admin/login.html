<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    <link rel="stylesheet"
          href="/css/admin.css">

    <link href="/css/output.css"
          rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            padding: 20px;

            font-family: Arial, sans-serif;

            overflow: hidden;

            background:
                radial-gradient(circle at top left,
                rgba(37,99,235,.35),
                transparent 30%),

                radial-gradient(circle at bottom right,
                rgba(168,85,247,.25),
                transparent 30%),

                linear-gradient(
                    135deg,
                    #0f172a,
                    #111827,
                    #1e293b
                );
        }

        /* Blur decorativo */

        .bg-blur {

            position: absolute;

            border-radius: 999px;

            filter: blur(90px);

            opacity: .35;

            z-index: 0;
        }

        .blur-1 {

            width: 320px;
            height: 320px;

            background: #2563eb;

            top: -100px;
            left: -100px;
        }

        .blur-2 {

            width: 300px;
            height: 300px;

            background: #9333ea;

            bottom: -100px;
            right: -100px;
        }

        /* Card */

        .login-card {

            position: relative;

            z-index: 2;

            width: 100%;
            max-width: 430px;

            padding: 42px 34px;

            border-radius: 30px;

            background:
                rgba(255,255,255,.12);

            backdrop-filter: blur(20px);

            border:
                1px solid rgba(255,255,255,.15);

            box-shadow:
                0 20px 50px rgba(0,0,0,.35);

            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-logo {

            width: 82px;
            height: 82px;

            margin: 0 auto 24px;

            border-radius: 24px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 34px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
                );

            color: white;

            box-shadow:
                0 10px 30px rgba(37,99,235,.35);
        }

        .login-card h1 {

            text-align: center;

            color: white;

            font-size: 34px;

            font-weight: 800;

            margin-bottom: 10px;

            letter-spacing: -1px;
        }

        .login-subtitle {

            text-align: center;

            color: rgba(255,255,255,.7);

            margin-bottom: 34px;

            font-size: 15px;
        }

        /* Inputs */

        .input-group {

            margin-bottom: 18px;
        }

        .input-group label {

            display: block;

            margin-bottom: 8px;

            color: rgba(255,255,255,.82);

            font-size: 14px;

            font-weight: 600;
        }

        .input-group input {

            width: 100%;

            padding: 16px 18px;

            border-radius: 16px;

            border:
                1px solid rgba(255,255,255,.12);

            background:
                rgba(255,255,255,.85);

            color: #1e293b;

            font-size: 15px;

            transition: .3s;
        }

        .input-group input::placeholder {

            color: rgba(30,41,59,.45);
        }

        .input-group input:focus {

            outline: none;

            border-color:
                rgba(96,165,250,.7);

            background:
                rgba(255,255,255,.12);

            box-shadow:
                0 0 0 4px rgba(37,99,235,.18);
        }

        /* Botón */

        .login-btn {

            width: 100%;

            margin-top: 12px;

            padding: 16px;

            border: none;

            border-radius: 18px;

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #1d4ed8
                );

            color: white;

            font-size: 16px;

            font-weight: 700;

            cursor: pointer;

            transition: .3s;

            box-shadow:
                0 10px 25px rgba(37,99,235,.3);
        }

        .login-btn:hover {

            transform: translateY(-3px);

            box-shadow:
                0 18px 35px rgba(37,99,235,.4);
        }

        .login-footer {

            margin-top: 24px;

            text-align: center;

            color: rgba(255,255,255,.45);

            font-size: 13px;
        }

        /* Mobile */

        @media(max-width: 600px) {

            .login-card {

                padding: 34px 24px;

                border-radius: 24px;
            }

            .login-card h1 {

                font-size: 28px;
            }

            .login-subtitle {

                font-size: 14px;
            }

            .input-group input {

                padding: 15px 16px;
            }

            .login-btn {

                padding: 15px;
            }
        }

    </style>

</head>

<body>

    <!-- Decoración -->

    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <!-- Card -->

    <div class="login-card">

        <div class="login-logo">

            🛍️

        </div>

        <h1>

            Panel Admin

        </h1>

        <p class="login-subtitle">

            Ingresá para administrar tu tienda

        </p>

        <div class="input-group">

            <label>

                Usuario

            </label>

            <input
                type="text"
                id="usuario"
                placeholder="Ingresá tu usuario"
            >

        </div>

        <div class="input-group">

            <label>

                Contraseña

            </label>

            <input
                type="password"
                id="password"
                placeholder="Ingresá tu contraseña"
            >

        </div>

        <div class="input-group" id="campoSlugManual" style="display:none;">

            <label>

                Identificador de la tienda

            </label>

            <input
                type="text"
                id="slugManual"
                placeholder="ej: deportes-rodriguez, nike, adidas"
            >
            <p style="font-size:12px;color:#94a3b8;margin-top:4px;">
                Este dato está en la URL de tu tienda: <strong>tudominio.com/<slug>/</strong>
            </p>

        </div>

        <button
            class="login-btn"
            onclick="login()">

            Ingresar al panel

        </button>

        <div class="login-footer">

            Mi Shop Admin © 2026

        </div>

    </div>

    <script>
        // Obtener slug de la URL actual: /:slug/admin/login.html
        function obtenerSlugDesdeURL() {
            const parts = window.location.pathname.split('/').filter(Boolean);
            if (parts.length >= 2 && parts[1] === 'admin') {
                return parts[0];
            }
            return null;
        }

        // Mostrar/ocultar campo de slug manual según si se detecta desde la URL
        function actualizarCampoSlug() {
            const slug = obtenerSlugDesdeURL();
            const campoSlug = document.getElementById('campoSlugManual');
            if (campoSlug) {
                campoSlug.style.display = slug ? 'none' : 'block';
            }
        }

        async function login() {
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            let slug = obtenerSlugDesdeURL();

            // Si no hay slug en la URL, usar el ingresado manualmente
            if (!slug) {
                slug = document.getElementById('slugManual').value.trim().toLowerCase();
            }

            if (!slug) {
                alert('Ingresá el identificador de tu tienda (ej: "deportes-rodriguez" o "nike")');
                document.getElementById('slugManual').focus();
                return;
            }

            const respuesta = await fetch(
                '/auth/login/tienda',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        usuario,
                        password,
                        slug
                    })
                }
            );

            const data = await respuesta.json();

            if (data.error) {
                alert(data.error);
                return;
            }

            // Redirigir al dashboard de la tienda
            if (data.tiendaSlug) {
                window.location = '/' + data.tiendaSlug + '/admin/dashboard.html';
            } else {
                window.location = '/admin/dashboard.html';
            }
        }

        // Inicializar: mostrar campo slug si es necesario
        document.addEventListener('DOMContentLoaded', actualizarCampoSlug);
    </script>

</body>

</html>
