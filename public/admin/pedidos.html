<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pedidos</title>

    <link rel="stylesheet"
          href="/css/admin.css?v=15">

</head>

<body class="bg-gray-100">

    <!-- Botón hamburguesa para mobile -->
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR UNIFICADO -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <h2>Panel Admin</h2>

                <p class="sidebar-subtitle">Gestión de tienda</p>

            </div>

            <nav class="sidebar-nav" id="sidebarNav">

                <a href="/admin/dashboard.html" class="nav-link" data-page="dashboard">
                    📊 Dashboard
                </a>

                <a href="/admin/admin.html" class="nav-link" data-page="admin">
                    📦 Productos
                </a>

                <a href="/admin/pedidos.html" class="active nav-link" data-page="pedidos">
                    🛒 Pedidos
                </a>

                <a href="/admin/categorias.html" class="nav-link" data-page="categorias">
                    🏷️ Categorías
                </a>

                <a href="/admin/personalizacion.html" class="nav-link" data-page="personalizacion">
                    🎨 Personalizar
                </a>

                <a href="/admin/mercadopago.html" class="nav-link" data-page="mercadopago">
                    💳 Activar método de pago
                </a>

                <a href="/superadmin/" id="linkSuperAdmin" style="display:none;border-top:1px solid #334155;margin-top:8px;padding-top:12px;" class="nav-link" data-page="superadmin">
                    ⚙️ Super Admin
                </a>

            </nav>

            <div class="sidebar-footer">

                <button onclick="logout()" class="logout-btn">
                    Cerrar sesión
                </button>

            </div>

        </aside>

        <!-- CONTENIDO -->
        <main class="admin-content">

            <!-- HEADER -->
            <div class="topbar">

                <div>

                    <h1>Pedidos</h1>

                    <p>Administración y seguimiento de pedidos</p>

                </div>

                <div class="stats-card">

                    <span>Total de pedidos</span>

                    <strong id="contadorPedidos">0</strong>

                </div>

            </div>

            <!-- FILTROS RÁPIDOS -->
            <section class="filtros-rapidos">

                <button class="filtro-btn active" data-filtro="todos">
                    📋 Todos
                </button>

                <button class="filtro-btn" data-filtro="Pendiente">
                    ⏳ Pendiente
                </button>

                <button class="filtro-btn" data-filtro="Entregado">
                    ✅ Entregado
                </button>

                <button class="filtro-btn" data-filtro="Pagado">
                    💳 Pagado
                </button>

                <button class="filtro-btn" data-filtro="Cancelado">
                    ❌ Cancelado
                </button>

            </section>

            <!-- BUSCADOR -->
            <section class="search-section">

                <input type="text"
                       id="buscadorPedidos"
                       placeholder="Buscar cliente, teléfono o estado...">

            </section>

            <!-- LISTA -->
            <div id="listaPedidos"
                 class="grid">
            </div>

            <!-- PAGINADO -->
            <div class="pagination">

                <button id="btnAnterior">

                    ← Anterior
                </button>

                <span id="paginaActual">

                    Página 1
                </span>

                <button id="btnSiguiente">

                    Siguiente →
                </button>

            </div>

        </main>

    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal de confirmación -->
    <div class="confirm-overlay" id="confirmOverlay" style="display:none;">
        <div class="confirm-dialog">
            <p class="confirm-mensaje" id="confirmMensaje"></p>
            <div class="confirm-acciones">
                <button class="confirm-btn confirm-cancelar" id="confirmCancelar">Cancelar</button>
                <button class="confirm-btn confirm-aceptar" id="confirmAceptar">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="/js/storeContext.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin-menu.js?v=2"></script>

    <script>
        verificarAuth();
    </script>

    <script src="/js/pedidos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', prefijarSidebar);
    </script>

    <!-- Script para el menú hamburguesa -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleMenu() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }

            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>

</body>

</html>
