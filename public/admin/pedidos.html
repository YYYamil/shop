<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pedidos</title>

    <link rel="stylesheet"
          href="/css/admin.css">

</head>

<body class="bg-gray-100">

    <!-- Botón hamburguesa para mobile -->
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">☰</button>

    <!-- Overlay para mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">

        <!-- SIDEBAR UNIFICADO -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-header">

                <h2>Panel Admin</h2>

                <p class="sidebar-subtitle">Gestión de tienda</p>

            </div>

            <nav class="sidebar-nav">

                <a href="/admin/dashboard.html">
                    📊 Dashboard
                </a>

                <a href="/admin/admin.html">
                    📦 Productos
                </a>

                <a href="/admin/pedidos.html" class="active">
                    🛒 Pedidos
                </a>

                <a href="/admin/personalizacion.html">
                    🎨 Personalizar
                </a>

            </nav>

            <div class="sidebar-footer">

                <button onclick="logout()" class="logout-btn">
                    Cerrar sesión
                </button>

            </div>

        </aside>

        <!-- CONTENIDO -->
        <main class="admin-content">

            <!-- HEADER -->
            <div class="topbar">

                <div>

                    <h1>Pedidos</h1>

                    <p>Administración y seguimiento de pedidos</p>

                </div>

                <div class="stats-card">

                    <span>Total de pedidos</span>

                    <strong id="contadorPedidos">0</strong>

                </div>

            </div>

            <!-- BUSCADOR -->
            <section class="search-section">

                <input type="text"
                       id="buscadorPedidos"
                       placeholder="Buscar cliente, teléfono o estado...">

            </section>

            <!-- LISTA -->
            <div id="listaPedidos"
                 class="grid">
            </div>

            <!-- PAGINADO -->
            <div class="pagination">

                <button id="btnAnterior">

                    ← Anterior
                </button>

                <span id="paginaActual">

                    Página 1
                </span>

                <button id="btnSiguiente">

                    Siguiente →
                </button>

            </div>

        </main>

    </div>

    <script src="/js/auth.js"></script>

    <script>
        verificarAuth();
    </script>

    <script src="/js/pedidos.js"></script>

    <!-- Script para el menú hamburguesa -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            function toggleMenu() {
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
            }

            menuToggle.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        });
    </script>

</body>

</html>
